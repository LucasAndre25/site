  <body>
    <header> <!-- CABEÇALHO-->
      <h1>Olá</h1> <!-- TITULO-->
       <nav> <!--SEÇÃO DE NAVEGACAO DO SITE "MENU" -->
          <ul><!-- LISTA NAO ORDENADA PARA LINKS DO MENU -->
              <li><a href="#sobre" id="botao1">Sobre mim</a></li> <!-- cada item da lista. # na frente do sobre é para linkar ele na pagina-->
              <li><a href="#Projetos" id="botao2">Projetos</a></li>
              <li><a href="#Contatos" id="botao1">Contatos</a></li>
              <li><a href="https:www.google.com.br"target="_blank">Google</a></li><!--"target="_blank" para o link abrir uma nova pagina-->
            
          </ul>

        </nav>
    </header>
    <section id="sobre"> 
      <h2> Sobre mim</h2>
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgVfHORQFLyUf_rNove-xUmxIskDeMJ63REz_YIMQ6S0vCyQdkBvJos4igKspvCgpqnpy8h0xM--1uckzZIxDgyoHy37-MowkF-YzvVx8&s=10"width="300
      " title="Imagem de um gato">
    
     <article>
        <p> Olá sou um gato laranja</p>
     </article>
    
     <aside>
        
      <h3>Habilidades</h3>
        
        <ul>
          <li>HTML</li>
          <li>CSS</li>
          <li>JAVASCRIPT</li>
        </ul>''
     
      </aside>

    </section>
    
    <section id="Projetos">

      <h2>PROJETOS</h2>
      
      <article>
        <h3>Portifolio</h3>
        <p> Este foi o primeiro site que desenvolvi</p>

      </article>
    </section>
    
    <footer>
      <p> Diretos reservados do Gato Laranja</p>

    </footer>

      <section id="contatos">
        <h2>contatos</h2>
        <p>tem um projeto em mente?, entre em contato</p>
        
        <form action=""><!-- DAQUI PARA BAIXO É UM SISTEMA DE FORMULARIO-->
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" required   placeholder="Digite seu nome"/><br> <!-- placeholder deixa uma frase na caixa de mensagem sugerindo oque escrever-->
          
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required   placeholder="Digite seu Email"/><br> <!--required deixa o campo obrigatorio para ser preeenchido-->

          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" required  placeholder="Digite seu telefone"/><br>

          <label for="assunto">Assunto:</label>
          <select name="assunto" id="assunto">
            <option value="orçamento">Orçamento</option>
            <option value="duvida">Duvida</option>
            <option value="outro">Outro</option>
          </select>
          
          <br>
          
          <label for="mensagem">Mensagem:</label>
          <textarea name="mensagem" id="mensagem" cols="30 " rows="10"></textarea> <!-- "textarea" cria uma caixa em branco para o usuario escrever -->
        
          <input type="checkbox" id="inscricao" name="inscricao">
          <label for="inscricao"> Deseja receber minha newsletter?</label>

          <br>

            <input type="submit" value="Enviar mensagem">
        
        </form>
      </section>
  </body>

</html>
